<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroFocus</title>
    <style>
      * { box-sizing: border-box; }
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, sans-serif;
        background: #0a0b0f;
        color: #e4e4e7;
      }
      h1 { font-size: 14px; margin: 0 0 10px; color: #22d3ee; }
      button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #2a2e3d;
        background: #1a1d28;
        color: #fafafa;
        cursor: pointer;
      }
      button:hover { border-color: #22d3ee55; }
      a { color: #a78bfa; font-size: 12px; }
      .row { margin-top: 10px; font-size: 11px; color: #71717a; }
    </style>
  </head>
  <body>
    <h1>NeuroFocus</h1>
    <p style="font-size: 12px; color: #a1a1aa; margin: 0">Brain-aware attention layer</p>
    <button type="button" id="open">Open dashboard</button>
    <button type="button" id="focus">Deep Focus (stub)</button>
    <div class="row"><a id="api" href="#">Check API health</a></div>
    <pre id="out" style="font-size: 10px; color: #34d399; white-space: pre-wrap; margin-top: 8px"></pre>
    <script src="popup.js"></script>
  </body>
</html>
